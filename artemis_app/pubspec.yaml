name: artemis_app
description: Artemis Personal OS — unified shell for all Rummel Tech modules
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  provider: ^6.1.0

  # Networking
  http: ^1.2.0
  dio: ^5.4.0
  web_socket_channel: ^3.0.1

  # Storage
  shared_preferences: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Auth
  google_sign_in: ^6.2.1

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.0

  # UI
  cupertino_icons: ^1.0.8
  material_design_icons_flutter: ^7.0.7296

  # Data
  intl: ^0.19.0
  uuid: ^4.3.0
  fl_chart: ^0.66.0

  # Shared services (API client, auth, token storage, monitoring)
  shared_services:
    path: ../../resources/shared_services

  # Design system
  rummel_blue_theme:
    path: ../../packages/flutter/rummel_blue_theme

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
